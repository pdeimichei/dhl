name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows build ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller reportlab

      - name: Build executable
        run: pyinstaller dhl.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DHL-windows
          path: dist/DHL.exe

  # ── macOS build ──────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tk for tkinter
        run: brew install python-tk@3.11

      - name: Install dependencies
        run: pip install pyinstaller reportlab

      - name: Build .app bundle
        run: pyinstaller dhl.spec

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -r dist/DHL.app dist/dmg/
          hdiutil create \
            -volname "DHL Spedizioni" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            dist/DHL-mac.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DHL-macos
          path: dist/DHL-mac.dmg

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DHL-windows
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: DHL-macos
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DHL.exe
            artifacts/DHL-mac.dmg
          body: |
            ## DHL Spedizioni

            ### Installazione
            - **Windows**: scarica `DHL.exe` ed eseguilo direttamente (nessuna installazione richiesta)
            - **macOS**: scarica `DHL-mac.dmg`, aprilo e trascina `DHL.app` nella cartella Applicazioni

            ### Requisiti
            Nessuno — tutte le dipendenze sono incluse nell'eseguibile.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
